<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; }
        header { background: #232f3e; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .container { max-width: 1200px; margin: 20px auto; padding: 10px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); overflow: hidden; transition: 0.3s; text-align: center; padding-bottom: 15px; }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 250px; object-fit: cover; }
        .product-card h3 { font-size: 18px; margin: 15px 0; color: #333; }
        .price { color: #e47911; font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .btn-whatsapp { background: #25d366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; font-weight: bold; display: inline-block; }
        .btn-whatsapp:hover { background: #128c7e; }
    </style>
</head>
<body>

<header>متجري الإلكتروني</header>

<div class="container">
    <div id="products-list" class="products-grid">
        <!-- المنتجات ستظهر هنا -->
    </div>
</div>

<script>
    function loadProducts() {
        const productsList = document.getElementById('products-list');
        const savedProducts = JSON.parse(localStorage.getItem('myProducts') || '[]');

        if (savedProducts.length === 0) {
            productsList.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">لا توجد منتجات حالياً. أضف منتجات من لوحة التحكم.</p>';
            return;
        }

        productsList.innerHTML = '';
        savedProducts.forEach(product => {
            const whatsappLink = `https://wa.me/201234567890?text=${encodeURIComponent('أهلاً، أود طلب: ' + product.name)}`;
            productsList.innerHTML += `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}">
                    <h3>${product.name}</h3>
                    <div class="price">${product.price} ريال</div>
                    <a href="${whatsappLink}" target="_blank" class="btn-whatsapp">اطلب عبر واتساب</a>
                </div>
            `;
        });
    }
    window.onload = loadProducts;
</script>
</body>
</html>
